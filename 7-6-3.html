<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>방문 요일에 따라 변하는 배경색</title>
</head>
<body>

<h3>월요일 ~ 토요일이면 gold, 일요일이면 pink 배경</h3>

<hr>

<script>
    let current = new Date();
    let day = current.getDay(); // 일요일(0) ~ 토요일(6)

    // 일요일(0)이면 pink, 그 외(월~토)는 gold
    if(day === 0)
        document.body.style.backgroundColor = "pink";
    else
        document.body.style.backgroundColor = "gold";

    document.write("현재 시간 : ");
    document.write(current.getHours(), "시, ");
    document.write(current.getMinutes(), "분, ");
    document.write(current.getSeconds(), "초<br>");
    
    // 요일 확인을 위한 추가 출력 (선택 사항)
    let dayNames = ["일", "월", "화", "수", "목", "금", "토"];
    document.write("현재 요일 : " + dayNames[day] + "요일");
</script>
</body>
</html>
